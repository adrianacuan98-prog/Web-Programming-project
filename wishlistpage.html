<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>
    <link rel="stylesheet" href="../css/styling.css">
</head>
<body>

    <!-- HEADER (copia tu template aquí arriba) -->

    <main id="wishlist-page">
        <h1>My Wishlist</h1>

        <div class="wishlist-container">

            <div class="book-card">
                <img src="/images/images.jpeg" alt="Book">
                <h3>A court of thorns and roses</h3>
                <p>$15.99</p>
                <button>Add to Cart</button>
                <button class="remove">Remove</button>
            </div>

            <div class="book-card">
                <img src="../images/book2.jpg" alt="Book">
                <h3>Book Title 2</h3>
                <p>$12.99</p>
                <button>Add to Cart</button>
                <button class="remove">Remove</button>
            </div>

        </div>
    </main>

</body>
</html>
